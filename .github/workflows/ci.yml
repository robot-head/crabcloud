name: CI

on:
  push:
    branches: [master, main]
  pull_request:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  SQLX_OFFLINE: "true"

jobs:
  fmt-and-clippy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets -- -D warnings

  build-wasm:
    runs-on: ubuntu-latest
    needs: fmt-and-clippy
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - name: Install dioxus-cli
        run: cargo install dioxus-cli --version "^0.7" --locked
      - name: Build WASM bundle
        # `crabcloud-ui` is a Dioxus 0.7 fullstack crate; here we only need
        # the browser bundle. The native side of the same source compiles to
        # a no-op stub bin (the real server is `crabcloud-server`).
        working-directory: crates/crabcloud-ui
        run: dx build --release --platform web
      - name: Upload built bundle
        uses: actions/upload-artifact@v7
        with:
          name: dx-public
          path: target/dx/crabcloud-ui/release/web/public
          if-no-files-found: error

  test-sqlite:
    runs-on: ubuntu-latest
    needs: fmt-and-clippy
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # No bundle artifact needed: with Dioxus 0.7 fullstack the server reads
      # the WASM bundle at runtime via `dioxus::server::router`, not at compile
      # time through `rust-embed`. Tests don't exercise asset serving.
      - run: cargo test --workspace

  test-multidialect:
    runs-on: ubuntu-latest
    needs: fmt-and-clippy
    services:
      mysql:
        image: mysql:9.7
        env:
          MYSQL_ROOT_PASSWORD: crabcloud
          MYSQL_DATABASE: crabcloud
          MYSQL_USER: crabcloud
          MYSQL_PASSWORD: crabcloud
        ports:
          - 3307:3306
        options: >-
          --health-cmd="mysqladmin ping -pcrabcloud"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=12
      postgres:
        image: postgres:18
        env:
          POSTGRES_DB: crabcloud
          POSTGRES_USER: crabcloud
          POSTGRES_PASSWORD: crabcloud
        ports:
          - 5433:5432
        options: >-
          --health-cmd="pg_isready -U crabcloud"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=12
    env:
      CRABCLOUD_TEST_MYSQL_URL:    mysql://crabcloud:crabcloud@127.0.0.1:3307/crabcloud
      CRABCLOUD_TEST_POSTGRES_URL: postgres://crabcloud:crabcloud@127.0.0.1:5433/crabcloud
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --test migrate_end_to_end -- --include-ignored

  e2e:
    runs-on: ubuntu-latest
    needs: build-wasm
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - name: Download WASM bundle
        uses: actions/download-artifact@v8
        with:
          name: dx-public
          path: target/dx/crabcloud-ui/release/web/public
      - name: Build release server
        run: cargo build --release -p crabcloud-server
      - name: Workaround dx wasm-bundle mismatch
        # `dx build --release` fingerprints both the JS bundle and the .wasm
        # (`crabcloud-ui-<hash>.js`, `crabcloud-ui_bg-<hash>.wasm`), but the
        # JS bundle still contains `new URL('./crabcloud-ui_bg.wasm',
        # import.meta.url)` from wasm-bindgen's ESM glue — that import isn't
        # rewritten to the hashed name. The dx-appended `__wbg_init(...)`
        # override fetches the hashed path, but wasm-bindgen's own preload
        # against the un-hashed name 404s first. Symlink the un-hashed name
        # to the hashed payload so both code paths resolve.
        run: |
          set -e
          pub=target/dx/crabcloud-ui/release/web/public/assets
          hashed=$(find "$pub" -name 'crabcloud-ui_bg-*.wasm' -print -quit)
          if [ -n "$hashed" ] && [ ! -e "$pub/crabcloud-ui_bg.wasm" ]; then
            ln -sf "$(basename "$hashed")" "$pub/crabcloud-ui_bg.wasm"
            echo "linked $pub/crabcloud-ui_bg.wasm -> $(basename "$hashed")"
          fi
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: e2e/package-lock.json
      - name: Install Playwright deps
        working-directory: e2e
        run: |
          npm ci
          npx playwright install --with-deps chromium
      - name: Generate bcrypt hash for fixture
        id: bcrypt
        run: |
          python3 -m pip install bcrypt
          HASH=$(python3 -c "import bcrypt; print(bcrypt.hashpw(b'hunter2', bcrypt.gensalt(12)).decode())")
          echo "hash=$HASH" >> "$GITHUB_OUTPUT"
      - name: Write fixture config
        env:
          BCRYPT_HASH: ${{ steps.bcrypt.outputs.hash }}
        run: |
          mkdir -p config
          cat > config/e2e.toml <<'EOF'
          instanceid     = "e2e"
          secret         = "a-32-byte-or-longer-secret-key!"
          passwordsalt   = "ps"
          installed      = true
          version        = "31.0.0.0"
          versionstring  = "31.0.0"
          dbtype         = "sqlite"
          dbname         = "__WS__/e2e.db"
          dbtableprefix  = "oc_"
          datadirectory  = "__WS__/data"
          trusted_domains = ["localhost", "127.0.0.1"]
          loglevel       = "info"
          bind_address   = "127.0.0.1:18765"
          db_pool_max    = 4

          [cache]
          backend = "memory"

          [bootstrap_admin]
          username      = "admin"
          password_hash = "__HASH__"
          EOF
          # Substitute placeholders without letting bash touch the values.
          sed -i "s|__WS__|$GITHUB_WORKSPACE|g" config/e2e.toml
          # Use python (already available + has bcrypt installed) so we don't have to escape $ for sed.
          python3 -c "import os, pathlib; p = pathlib.Path('config/e2e.toml'); p.write_text(p.read_text().replace('__HASH__', os.environ['BCRYPT_HASH']))"
      - name: Migrate
        run: cargo run --release -p crabcloud-server -- --config config/e2e.toml migrate
      - name: Bootstrap test users (alice + bob)
        # Sharing scenarios need a second + third user. `user-add` reads
        # the password from stdin via rpassword, which falls back to the
        # stdin reader when no TTY is present — exactly the CI situation.
        # Pipe `password\npassword\n` twice for the prompt + confirm.
        run: |
          for u in alice bob; do
            printf 'hunter2\nhunter2\n' | ./target/release/crabcloud-server --config config/e2e.toml user-add "$u"
          done
      - name: Start server
        # `DIOXUS_PUBLIC_PATH` overrides the default
        # `<exe-dir>/public` lookup performed by `dioxus::server::router`.
        env:
          DIOXUS_PUBLIC_PATH: ${{ github.workspace }}/target/dx/crabcloud-ui/release/web/public
        run: |
          ./target/release/crabcloud-server --config config/e2e.toml serve &
          echo "SERVER_PID=$!" >> "$GITHUB_ENV"
          # Wait for the server to become ready.
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:18765/status.php >/dev/null; then
              echo "Server ready"
              exit 0
            fi
            sleep 1
          done
          echo "Server did not become ready"
          exit 1
      - name: Run Playwright tests
        working-directory: e2e
        env:
          CRABCLOUD_E2E_URL: http://127.0.0.1:18765
        run: npm test
      - name: Stop server
        if: always()
        run: |
          if [ -n "$SERVER_PID" ]; then
            kill "$SERVER_PID" 2>/dev/null || true
          fi
      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: e2e/playwright-report
          retention-days: 7
      - name: Upload Playwright test-results on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-test-results
          path: e2e/test-results
          retention-days: 7
