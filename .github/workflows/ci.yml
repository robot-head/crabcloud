name: CI

on:
  push:
    branches: [master, main]
  pull_request:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  SQLX_OFFLINE: "true"

jobs:
  fmt-and-clippy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets -- -D warnings

  build-wasm:
    runs-on: ubuntu-latest
    needs: fmt-and-clippy
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - name: Install dioxus-cli
        run: cargo install dioxus-cli --version "^0.6" --locked
      - name: Build WASM bundle
        working-directory: crates/rustcloud-ui
        run: dx build --release --platform web
      - name: Upload built bundle
        uses: actions/upload-artifact@v4
        with:
          name: dx-public
          path: target/dx/rustcloud-ui/release/web/public

  test-sqlite:
    runs-on: ubuntu-latest
    needs: build-wasm
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - name: Download built bundle
        uses: actions/download-artifact@v4
        with:
          name: dx-public
          path: target/dx/rustcloud-ui/release/web/public
      - run: cargo test --workspace

  test-multidialect:
    runs-on: ubuntu-latest
    needs: fmt-and-clippy
    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: rustcloud
          MYSQL_DATABASE: rustcloud
          MYSQL_USER: rustcloud
          MYSQL_PASSWORD: rustcloud
        ports:
          - 3307:3306
        options: >-
          --health-cmd="mysqladmin ping -prustcloud"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=12
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: rustcloud
          POSTGRES_USER: rustcloud
          POSTGRES_PASSWORD: rustcloud
        ports:
          - 5433:5432
        options: >-
          --health-cmd="pg_isready -U rustcloud"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=12
    env:
      RUSTCLOUD_TEST_MYSQL_URL:    mysql://rustcloud:rustcloud@127.0.0.1:3307/rustcloud
      RUSTCLOUD_TEST_POSTGRES_URL: postgres://rustcloud:rustcloud@127.0.0.1:5433/rustcloud
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --test migrate_end_to_end -- --include-ignored

  e2e:
    runs-on: ubuntu-latest
    needs: build-wasm
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - name: Download WASM bundle
        uses: actions/download-artifact@v4
        with:
          name: dx-public
          path: target/dx/rustcloud-ui/release/web/public
      - name: Build release server
        run: cargo build --release -p rustcloud-server
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: e2e/package-lock.json
      - name: Install Playwright deps
        working-directory: e2e
        run: |
          npm ci
          npx playwright install --with-deps chromium
      - name: Generate bcrypt hash for fixture
        id: bcrypt
        run: |
          python3 -m pip install bcrypt
          HASH=$(python3 -c "import bcrypt; print(bcrypt.hashpw(b'hunter2', bcrypt.gensalt(12)).decode())")
          echo "hash=$HASH" >> "$GITHUB_OUTPUT"
      - name: Write fixture config
        env:
          BCRYPT_HASH: ${{ steps.bcrypt.outputs.hash }}
        run: |
          mkdir -p config
          cat > config/e2e.toml <<'EOF'
          instanceid     = "e2e"
          secret         = "a-32-byte-or-longer-secret-key!"
          passwordsalt   = "ps"
          installed      = true
          version        = "31.0.0.0"
          versionstring  = "31.0.0"
          dbtype         = "sqlite"
          dbname         = "__WS__/e2e.db"
          dbtableprefix  = "oc_"
          datadirectory  = "__WS__/data"
          trusted_domains = ["localhost", "127.0.0.1"]
          loglevel       = "info"
          bind_address   = "127.0.0.1:18765"
          db_pool_max    = 4

          [cache]
          backend = "memory"

          [bootstrap_admin]
          username      = "admin"
          password_hash = "__HASH__"
          EOF
          # Substitute placeholders without letting bash touch the values.
          sed -i "s|__WS__|$GITHUB_WORKSPACE|g" config/e2e.toml
          # Use python (already available + has bcrypt installed) so we don't have to escape $ for sed.
          python3 -c "import os, pathlib; p = pathlib.Path('config/e2e.toml'); p.write_text(p.read_text().replace('__HASH__', os.environ['BCRYPT_HASH']))"
      - name: Migrate
        run: cargo run --release -p rustcloud-server -- --config config/e2e.toml migrate
      - name: Start server
        run: |
          ./target/release/rustcloud-server --config config/e2e.toml serve &
          echo "SERVER_PID=$!" >> "$GITHUB_ENV"
          # Wait for the server to become ready.
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:18765/status.php >/dev/null; then
              echo "Server ready"
              exit 0
            fi
            sleep 1
          done
          echo "Server did not become ready"
          exit 1
      - name: Run Playwright tests
        working-directory: e2e
        env:
          RUSTCLOUD_E2E_URL: http://127.0.0.1:18765
        run: npm test
      - name: Stop server
        if: always()
        run: |
          if [ -n "$SERVER_PID" ]; then
            kill "$SERVER_PID" 2>/dev/null || true
          fi
      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/playwright-report
          retention-days: 7
