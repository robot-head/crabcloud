name: CI

on:
  push:
    branches: [master, main]
  pull_request:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  SQLX_OFFLINE: "true"

jobs:
  fmt-and-clippy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets -- -D warnings

  test-sqlite:
    runs-on: ubuntu-latest
    needs: fmt-and-clippy
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # No bundle artifact needed: with Dioxus 0.7 fullstack the server reads
      # the WASM bundle at runtime via `dioxus::server::router`, not at compile
      # time through `rust-embed`. Tests don't exercise asset serving.
      - run: cargo test --workspace

  test-multidialect:
    runs-on: ubuntu-latest
    needs: fmt-and-clippy
    services:
      mysql:
        image: mysql:9.7
        env:
          MYSQL_ROOT_PASSWORD: crabcloud
          MYSQL_DATABASE: crabcloud
          MYSQL_USER: crabcloud
          MYSQL_PASSWORD: crabcloud
        ports:
          - 3307:3306
        options: >-
          --health-cmd="mysqladmin ping -pcrabcloud"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=12
      postgres:
        image: postgres:18
        env:
          POSTGRES_DB: crabcloud
          POSTGRES_USER: crabcloud
          POSTGRES_PASSWORD: crabcloud
        ports:
          - 5433:5432
        options: >-
          --health-cmd="pg_isready -U crabcloud"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=12
    env:
      CRABCLOUD_TEST_MYSQL_URL:    mysql://crabcloud:crabcloud@127.0.0.1:3307/crabcloud
      CRABCLOUD_TEST_POSTGRES_URL: postgres://crabcloud:crabcloud@127.0.0.1:5433/crabcloud
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --test migrate_end_to_end -- --include-ignored

  e2e:
    runs-on: ubuntu-latest
    needs: fmt-and-clippy
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - name: Install dioxus-cli
        run: cargo install dioxus-cli --version "^0.7" --locked
      - name: dx build --release (fullstack via @client / @server)
        # The `@client` / `@server` subcommand syntax (dx 0.7 cli/build.rs)
        # is the only invocation that produces a *correctly-hashed*
        # fullstack layout: `public/assets/<hash>.{css,js,wasm}` referenced
        # by a proper `public/index.html` AND a `server` binary whose
        # link-time asset substitution matches those hashes.
        #
        # `@client` builds the wasm32 target with `--features web` (no
        # default features → no server-stack deps in the wasm graph).
        # `@server` builds the host target with `--features server` (the
        # native stack — sqlx, axum, tower, hyper). Without explicit
        # per-target features the wasm build pulls in server-only deps
        # that don't compile for wasm32; without explicit per-target
        # targets the server build inherits the wasm32 target from the
        # shared args and fails.
        #
        # The `--target x86_64-unknown-linux-gnu` on @server is the CI
        # runner's host triple. Verified locally via the same Linux Docker
        # image; produces every expected artifact, server binary boots,
        # SSR HTML references the hashed paths, no `index.html` warning.
        working-directory: crates/crabcloud-app
        run: |
          dx build --release \
            @client --no-default-features --features web --target wasm32-unknown-unknown \
            @server --no-default-features --features server --target x86_64-unknown-linux-gnu
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: e2e/package-lock.json
      - name: Install Playwright deps
        working-directory: e2e
        run: |
          npm ci
          npx playwright install --with-deps chromium
      - name: Generate bcrypt hash for fixture
        id: bcrypt
        run: |
          python3 -m pip install bcrypt
          HASH=$(python3 -c "import bcrypt; print(bcrypt.hashpw(b'hunter2', bcrypt.gensalt(12)).decode())")
          echo "hash=$HASH" >> "$GITHUB_OUTPUT"
      - name: Write fixture config
        env:
          BCRYPT_HASH: ${{ steps.bcrypt.outputs.hash }}
        run: |
          mkdir -p config
          cat > config/e2e.toml <<'EOF'
          instanceid     = "e2e"
          secret         = "a-32-byte-or-longer-secret-key!"
          passwordsalt   = "ps"
          installed      = true
          version        = "31.0.0.0"
          versionstring  = "31.0.0"
          dbtype         = "sqlite"
          dbname         = "__WS__/e2e.db"
          dbtableprefix  = "oc_"
          datadirectory  = "__WS__/data"
          trusted_domains = ["localhost", "127.0.0.1"]
          loglevel       = "info"
          bind_address   = "127.0.0.1:18765"
          db_pool_max    = 4

          [cache]
          backend = "memory"

          [bootstrap_admin]
          username      = "admin"
          password_hash = "__HASH__"
          EOF
          # Substitute placeholders without letting bash touch the values.
          sed -i "s|__WS__|$GITHUB_WORKSPACE|g" config/e2e.toml
          # Use python (already available + has bcrypt installed) so we don't have to escape $ for sed.
          python3 -c "import os, pathlib; p = pathlib.Path('config/e2e.toml'); p.write_text(p.read_text().replace('__HASH__', os.environ['BCRYPT_HASH']))"
      - name: Migrate
        run: ./target/dx/crabcloud-app/release/web/server --config config/e2e.toml migrate
      - name: Bootstrap sharing-test users
        # `user-add` defaults to an interactive prompt via rpassword, which
        # reads /dev/tty directly and fails on a CI runner without a TTY.
        # `--password-stdin` reads one line of password from stdin instead.
        #
        # Uses dedicated `sharealice` / `sharebob` uids so the bootstrap
        # doesn't collide with `admin_ocs.spec.ts`, which creates+deletes
        # a user literally named `bob` as part of its CRUD test.
        run: |
          for u in sharealice sharebob; do
            echo 'hunter2' | ./target/dx/crabcloud-app/release/web/server --config config/e2e.toml user-add "$u" --password-stdin
          done
      - name: Start server
        # The dx-built binary knows where its sibling `public/` lives, so
        # we no longer need to set `DIOXUS_PUBLIC_PATH`.
        run: |
          ./target/dx/crabcloud-app/release/web/server --config config/e2e.toml serve &
          echo "SERVER_PID=$!" >> "$GITHUB_ENV"
          # Wait for the server to become ready.
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:18765/status.php >/dev/null; then
              echo "Server ready"
              exit 0
            fi
            sleep 1
          done
          echo "Server did not become ready"
          exit 1
      - name: Run Playwright tests
        working-directory: e2e
        env:
          CRABCLOUD_E2E_URL: http://127.0.0.1:18765
        run: npm test
      - name: Assert SSR stylesheet href is a hashed URL
        # Regression guard for the dx 0.7.9 placeholder-leak bug. After
        # consolidation the SSR'd `<link rel="stylesheet">` href must be a
        # real hashed `/assets/<hash>.css` path produced by dx's link-time
        # substitution — never the manganis placeholder ("This should be
        # replaced by dx as part of the build process. …"). We check the
        # running server's `/login` response directly; that's the actual
        # production code path.
        run: |
          body=$(curl -sf http://127.0.0.1:18765/login)
          if echo "$body" | grep -q "This should be replaced by dx"; then
            echo "FAIL: SSR HTML contains the manganis placeholder. Body:"
            echo "$body" | head -100
            exit 1
          fi
          if ! echo "$body" | grep -qE '<link rel="stylesheet" href="/assets/[A-Za-z0-9._-]+\.css"'; then
            echo "FAIL: no hashed stylesheet href in SSR HTML. Body:"
            echo "$body" | head -100
            exit 1
          fi
          echo "OK: SSR stylesheet href is a hashed URL."
          echo "$body" | grep -oE '<link rel="stylesheet" href="[^"]*"' | head -1
      - name: Stop server
        if: always()
        run: |
          if [ -n "$SERVER_PID" ]; then
            kill "$SERVER_PID" 2>/dev/null || true
          fi
      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: e2e/playwright-report
          retention-days: 7
      - name: Upload Playwright test-results on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-test-results
          path: e2e/test-results
          retention-days: 7
