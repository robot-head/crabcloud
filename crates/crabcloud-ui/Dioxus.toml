[application]
name = "crabcloud-ui"
# Dioxus 0.7 fullstack: one crate compiles to both server (native) and web
# (wasm32). `dx serve` / `dx build --platform fullstack` orchestrates both.
default_platform = "fullstack"
out_dir = "public"

[web.app]
title = "Crabcloud"
base_path = "assets"

[web.watcher]
reload_html = false
watch_path = ["src", "assets"]

[web.resource]
style = ["assets/app.css"]
script = []

[web.resource.dev]
script = []
