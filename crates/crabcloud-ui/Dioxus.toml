[application]
name = "crabcloud-ui"
# `dx build --platform web` produces just the WASM client bundle that the
# fullstack server (crabcloud-server) loads from disk at runtime. We don't
# use `dx serve` (the entire stack runs through crabcloud-server's axum
# binary), so `default_platform` stays `web` — only the build is needed.
default_platform = "web"
out_dir = "public"

[web.app]
title = "Crabcloud"
base_path = "assets"

[web.watcher]
reload_html = false
watch_path = ["src", "assets"]

[web.resource]
style = ["assets/app.css"]
script = []

[web.resource.dev]
script = []
